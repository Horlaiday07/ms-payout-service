spring:
  application:
    name: payout-service

server:
  port: 8082

# ============ DATASOURCE ============
spring.datasource:
  url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:payout_db}
  username: ${POSTGRES_USER:postgres}
  password: ${POSTGRES_PASSWORD:root}
  driver-class-name: org.postgresql.Driver
  hikari:
    maximum-pool-size: 50
    minimum-idle: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# ============ JPA ============
spring.jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false
  properties:
    hibernate:
      format_sql: true
      default_schema: public
      jdbc:
        batch_size: 50
  open-in-view: false

# ============ FLYWAY ============
spring.flyway:
  enabled: true
  baseline-on-migrate: true
  locations: classpath:db/migration

# ============ REDIS ============
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  timeout: 5000ms
  lettuce:
    pool:
      max-active: 20
      max-idle: 10
      min-idle: 5

# ============ RABBITMQ ============
spring.rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USER:guest}
  password: ${RABBITMQ_PASSWORD:guest}
  virtual-host: /
  connection-timeout: 5000
  publisher-confirm-type: correlated
  publisher-returns: true
  listener:
    simple:
      acknowledge-mode: manual
      prefetch: 10
      retry:
        enabled: false

# ============ NIBSS/Processor ============
payout:
  nibss:
    base-url: ${NIBSS_BASE_URL:https://naming-enquiry.free.beeceptor.com}
    timeout: 30000
    name-enquiry-path: /api/nip/nameEnquiry
    transfer-path: /api/nip/transfer
    query-path: /api/nip/transaction/query

  ledger:
    base-url: ${LEDGER_BASE_URL:http://localhost:8083}
    timeout: 10000
    balance-path: /api/v1/accounts/{accountId}/balance
    debit-path: /api/v1/ledger/debit

  idempotency:
    ttl-hours: 24
    key-prefix: "idempotency:"

  webhook:
    signature-header: X-Webhook-Signature
    max-retries: 5
    retry-delay-ms: 1000
    timeout-ms: 10000

  signature:
    timestamp-tolerance-seconds: 300

  # Payment dashboard (source of truth for merchants); internal sync uses X-Payout-Sync-Key only (no JWT).
  payment-dashboard:
    base-url: ${PAYMENT_DASHBOARD_BASE_URL:http://localhost:8080}
    sync-api-key: ${PAYOUT_MERCHANT_SYNC_API_KEY:dev-payout-merchant-sync-change-in-prod}

  merchant-cache:
    reader-enabled: ${PAYOUT_MERCHANT_CACHE_READER_ENABLED:true}
    key-prefix: ${PAYOUT_MERCHANT_CACHE_KEY_PREFIX:payout:merchant:}

  security:
    # Base64-encoded 32-byte AES key, or any string (SHA-256 used as key material)
    secret-encryption-key: ${PAYOUT_SECRET_ENCRYPTION_KEY:}

  messaging:
    transfer-ttl: 60000
    query-ttl: 30000

# ============ LOGGING ============
logging:
  level:
    root: INFO
    com.remit.mellonsecure: INFO
    org.springframework.amqp: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# JSON logging for production (uncomment for structured logs)
# logging.pattern.console: ""

# ============ SWAGGER ============
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ============ ACTUATOR ============
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
